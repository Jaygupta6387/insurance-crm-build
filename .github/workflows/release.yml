name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout desktop release shell
        uses: actions/checkout@v4

      - name: Checkout CRM backend source
        uses: actions/checkout@v4
        with:
          repository: Jaygupta6387/InsureCRM-Backend
          path: crm-app/backend
          token: ${{ secrets.CRM_SOURCE_TOKEN }}

      - name: Checkout CRM frontend source
        uses: actions/checkout@v4
        with:
          repository: Jaygupta6387/InsureCRM-Frontend
          path: crm-app/frontend
          token: ${{ secrets.CRM_SOURCE_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Sync CRM app into bundle
        env:
          CRM_APP_PATH: crm-app
        run: node scripts/sync-crm-app.mjs

      - name: Build Electron shell
        run: npm run build

      - name: Bundle PostgreSQL (Windows)
        if: matrix.platform == 'win'
        run: node scripts/bundle-postgresql.mjs --platform win

      - name: Bundle PostgreSQL (macOS)
        if: matrix.platform == 'mac'
        run: |
          brew install postgresql@16
          node scripts/bundle-postgresql.mjs --platform mac

      - name: Verify CRM bundle before packaging
        run: node scripts/verify-crm-bundle.mjs

      - name: Publish macOS release
        if: matrix.platform == 'mac'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --publish always --config electron-builder.yml

      - name: Publish Windows release
        if: matrix.platform == 'win'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always --config electron-builder.yml
